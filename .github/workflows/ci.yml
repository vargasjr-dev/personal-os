name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Kernel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Install bootimage
        run: cargo install bootimage

      - name: Build
        run: cargo build

      - name: Build bootable image
        run: cargo bootimage

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview

      - name: Install bootimage
        run: cargo install bootimage

      - name: Install QEMU
        run: sudo apt-get update && sudo apt-get install -y qemu-system-x86

      - name: Run tests
        run: cargo test
        env:
          # Force --cfg test into every rustc invocation including the
          # build-std sysroot pass, so the standalone-sysroot core and
          # alloc's test-dep core share the same fingerprint hash.
          # Without this, build-std compiles core twice with different
          # hashes (E0152 duplicate lang item).
          RUSTFLAGS: "--cfg test"

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview, clippy

      - name: Clippy
        run: cargo clippy -- -D warnings
        continue-on-error: true  # Kernel code may have valid clippy exceptions
